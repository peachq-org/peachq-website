site_name: PeachQ
site_url: https://peachq.org/
site_description: Documentation and news for PeachQ, an open source implementation of q.
repo_url: https://github.com/peachq-org/peachq
edit_uri: https://github.com/peachq-org/peachq-website/edit/main/content/

# MkDocs owns only /docs and /news. Everything at the site root -- the landing
# page, download, roadmap, about, repl, compatibility and contact -- is PHP
# served by Apache from static/, using the site's own template.php. The two
# halves are deliberately separate skins, like kx.com and code.kx.com.
docs_dir: content

theme:
  name: material
  custom_dir: overrides
  logo: img/peachq-logo.svg
  favicon: img/favicon.ico
  # No `media:` entries. Those make Material auto-select from the system
  # preference, which fights the explicit choice shared with the root pages via
  # localStorage["peachq-theme"]. Index 0 is light, index 1 is dark, and
  # overrides/main.html keeps them in step with the PHP side.
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  # navigation.tabs is deliberately absent: overrides/partials/header.html
  # renders the nav inline in the header row instead, matching template.php.
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

extra_css:
  - css/extra.css

plugins:
  - search
  - blog:
      blog_dir: news
      post_url_format: "{date}-{slug}"
      post_excerpt: optional
      archive: true
      categories: true
      pagination_per_page: 10

# Mirrors the nav in static/template.php exactly, in the same order, so moving
# between the PHP root pages and this section does not change the menu. Keep the
# two in sync: if you add an entry to template.php, add it here too.
# GitHub is covered by repo_url, which Material renders in the header.
nav:
  - Try Live: https://peachq.org/repl
  - Download: https://peachq.org/download
  - Compatibility: https://peachq.org/compatibility
  - Roadmap: https://peachq.org/roadmap
  - News: news/index.md
  - About: https://peachq.org/about
  - Contact: https://peachq.org/contact

# /docs is live but deliberately unlinked from the nav for now.
not_in_nav: |
  docs/*.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
