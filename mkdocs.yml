site_name: PeachQ
site_url: https://peachq.org/
site_description: An open source implementation of q, built on Rayforce.
repo_url: https://github.com/peachq-org/peachq
edit_uri: https://github.com/peachq-org/peachq-website/edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: img/peachq-logo.svg
  favicon: img/favicon.ico
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

# styles.css lives in docs/ rather than static/ so Material emits it into every
# page -- including _chrome, which is how the PHP pages inherit it. The PHP
# pages reference /css/styles.css directly, so there is exactly one copy.
extra_css:
  - css/styles.css
  - css/extra.css

nav:
  - Home: index.md

# _chrome.md exists only so the build can emit header/footer for the PHP pages
# (see tools/split_chrome.py). It is never user-visible and is deleted from the
# output after the split.
not_in_nav: |
  _chrome.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
