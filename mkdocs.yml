site_name: PeachQ
site_url: https://peachq.org/
site_description: Documentation and news for PeachQ, an open source implementation of q.
repo_url: https://github.com/peachq-org/peachq
edit_uri: https://github.com/peachq-org/peachq-website/edit/main/content/

# MkDocs owns only /docs and /news. Everything at the site root -- the landing
# page, download, roadmap, about, repl, compatibility and contact -- is PHP
# served by Apache from static/, using the site's own template.php. The two
# halves are deliberately separate skins, like kx.com and code.kx.com.
docs_dir: content

theme:
  name: material
  custom_dir: overrides
  logo: img/peachq-logo.svg
  favicon: img/favicon.ico
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.action.edit

extra_css:
  - css/extra.css

plugins:
  - search
  - blog:
      blog_dir: news
      post_url_format: "{date}-{slug}"
      post_excerpt: optional
      archive: true
      categories: true
      pagination_per_page: 10

# The absolute entries point back at the PHP root pages, so the docs section is
# not a one-way trip. The logo links home via site_url as well.
nav:
  - Docs: docs/index.md
  - News: news/index.md
  - Try Live: https://peachq.org/repl
  - Download: https://peachq.org/download
  - Main site: https://peachq.org/

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
