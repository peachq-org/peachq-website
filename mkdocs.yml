site_name: PeachQ
site_url: https://peachq.org/
site_description: Documentation and news for PeachQ, an open source implementation of q.
repo_url: https://github.com/peachq-org/peachq
edit_uri: https://github.com/peachq-org/peachq-website/edit/main/content/

# MkDocs owns only /docs and /news. Everything at the site root -- the landing
# page, download, roadmap, about, repl, compatibility and contact -- is PHP
# served by Apache from static/, using the site's own template.php. The two
# halves are deliberately separate skins, like kx.com and code.kx.com.
docs_dir: content

theme:
  name: material
  custom_dir: overrides
  logo: img/peachq-logo.svg
  favicon: img/favicon.ico
  # No `media:` entries. Those make Material auto-select from the system
  # preference, which fights the explicit choice shared with the root pages via
  # localStorage["peachq-theme"]. Index 0 is light, index 1 is dark, and
  # overrides/main.html keeps them in step with the PHP side.
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  # navigation.tabs is deliberately absent: overrides/partials/header.html
  # renders the nav inline in the header row instead, matching template.php.
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

extra_css:
  - css/extra.css

plugins:
  - search
  - blog:
      blog_dir: news
      post_url_format: "{date}-{slug}"
      post_excerpt: optional
      archive: true
      categories: true
      pagination_per_page: 10

# MkDocs' own structure. Only pages it generates belong here.
nav:
  - News: news/index.md

# /docs is live but deliberately unlinked from the menu for now.
not_in_nav: |
  docs/*.md

extra:
  # The site menu, rendered inline by overrides/partials/header.html. It mirrors
  # the $nav array in static/template.php exactly, in the same order, so moving
  # between the PHP root pages and this section does not change the menu.
  #
  # URLs are root-relative, not absolute: the PHP pages use root-relative hrefs
  # too, and hard-coding https://peachq.org/ would send anyone browsing a local
  # build or a staging host off to production. They live under `extra` rather
  # than `nav` because MkDocs tries to resolve `nav` entries as documents.
  #
  # Keep in sync with static/template.php; tests/test_pages.sh checks this.
  peachq_nav:
    - title: Try Live
      url: /repl
    - title: Download
      url: /download
    - title: Compatibility
      url: /compatibility
    - title: Roadmap
      url: /roadmap
    - title: News
      url: /news/
    - title: About
      url: /about
    - title: Contact
      url: /contact

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
